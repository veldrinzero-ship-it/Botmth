<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Bersusun AI</title>
    <style>
        :root {
            --bg: #050505;
            --card: #111111;
            --accent: #ff0000;
            --text: #ffffff;
            --ghost-white: #f0f0f0;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 15px;
            background: var(--card);
            text-align: center;
            border-bottom: 2px solid var(--accent);
            font-size: 1.2em;
            font-weight: bold;
            text-shadow: 0 0 10px var(--accent);
        }

        #display-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .math-box {
            background: var(--card);
            border-left: 4px solid var(--accent);
            padding: 15px;
            border-radius: 4px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }

        .bersusun-text {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 1.1rem;
            line-height: 1.4;
            white-space: pre; /* Menjaga spasi agar angka sejajar */
            color: #00ff41; /* Warna hijau matrix agar kontras */
            background: #000;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }

        .input-bar {
            padding: 15px;
            background: var(--card);
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
        }

        input {
            flex: 1;
            background: #222;
            border: 1px solid var(--accent);
            color: white;
            padding: 12px;
            border-radius: 5px;
            outline: none;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .label { color: var(--accent); font-weight: bold; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<header>DenzX MATH BERSUSUN</header>

<div id="display-area">
    <div class="math-box">
        <span class="label">STATUS: READY</span>
        Masukkan soal seperti "17x17", "144:12", atau "500-125"
    </div>
</div>

<div class="input-bar">
    <input type="text" id="mathInput" placeholder="Contoh: 17 x 17" onkeypress="checkEnter(event)">
    <button onclick="prosesMatematika()">HITUNG</button>
</div>

<script>
    const display = document.getElementById('display-area');

    function checkEnter(e) { if (e.key === 'Enter') prosesMatematika(); }

    function prosesMatematika() {
        const input = document.getElementById('mathInput').value.toLowerCase().replace(/\s+/g, '');
        if (!input) return;

        let resultHTML = "";
        
        if (input.includes('x') || input.includes('*')) {
            const parts = input.split(/[x*]/);
            resultHTML = hitungPerkalian(parseInt(parts[0]), parseInt(parts[1]));
        } 
        else if (input.includes('-')) {
            const parts = input.split('-');
            resultHTML = hitungPengurangan(parseInt(parts[0]), parseInt(parts[1]));
        }
        else if (input.includes(':') || input.includes('/')) {
            const parts = input.split(/[:/]/);
            resultHTML = hitungPembagian(parseInt(parts[0]), parseInt(parts[1]));
        }

        const box = document.createElement('div');
        box.className = 'math-box';
        box.innerHTML = `<span class="label">HASIL ANALISIS:</span><div class="bersusun-text">${resultHTML}</div>`;
        display.appendChild(box);
        display.scrollTop = display.scrollHeight;
        document.getElementById('mathInput').value = "";
    }

    function hitungPerkalian(a, b) {
        const kali1 = a * (b % 10);
        const kali2 = a * Math.floor(b / 10);
        const total = a * b;
        
        return `  ${a}
  ${b}
------- x
  ${kali1.toString().padStart(a.toString().length, ' ')}
 ${kali2.toString().padStart(a.toString().length, ' ')}0
------- +
  ${total}`;
    }

    function hitungPengurangan(a, b) {
        const total = a - b;
        return `  ${a}
  ${b}
------- -
  ${total}`;
    }

    function hitungPembagian(a, b) {
        const hasil = Math.floor(a / b);
        // Visualisasi sederhana Porogapit
        return `      ${hasil}
    ______
 ${b} / ${a}
     ... (proses)
     ------- -
      0`;
    }
</script>

</body>
</html>
